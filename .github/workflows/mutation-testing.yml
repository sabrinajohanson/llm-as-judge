name: Mutation Testing

on:
  workflow_dispatch:

jobs:
  mutate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install mutmut

      - name: Run mutation testing
        env:
          OPENAI_API_KEY: "fake-key-for-tests"
        run: mutmut run 2>&1 | tee mutation-run.log || true

      - name: Save survivors list
        run: mutmut results | tee mutation-survivors.txt

      - name: Generate mutation report
        run: python scripts/generate_mutation_report.py

      - name: Upload mutation report
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: mutation-report/
          retention-days: 30