name: Mutation Testing

on:
  workflow_dispatch:

jobs:
  mutate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install mutmut

      - name: Run mutation testing
        env:
          OPENAI_API_KEY: "fake-key-for-tests"
        run: mutmut run || true

      - name: Save results summary
        run: mutmut results | tee mutation-report.txt

      - name: Show selected survivor diffs
        run: |
          echo "=== read_test_cases__mutmut_3 ==="
          mutmut show judge.x_read_test_cases__mutmut_3 || true
          echo "=== build_judge_prompt__mutmut_2 ==="
          mutmut show judge.x_build_judge_prompt__mutmut_2 || true
          echo "=== evaluate_test_case__mutmut_4 ==="
          mutmut show judge.x_evaluate_test_case__mutmut_4 || true
          echo "=== evaluate_all_test_cases__mutmut_2 ==="
          mutmut show judge.x_evaluate_all_test_cases__mutmut_2 || true

      - name: Save CI/CD stats
        run: mutmut export-cicd-stats > mutation-cicd-stats.json || true

      - name: Upload mutation report
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: |
            mutation-report.txt
            mutation-cicd-stats.json
          retention-days: 30