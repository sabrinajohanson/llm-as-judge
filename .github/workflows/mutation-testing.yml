name: Mutation Testing

on:
  workflow_dispatch:

jobs:
  mutate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install mutmut

      - name: Run mutation testing
        env:
          OPENAI_API_KEY: "fake-key-for-tests"
        run: mutmut run || true

      - name: Show results summary
        run: mutmut results

      - name: Show mutmut version and available commands
        run: |
          pip show mutmut
          mutmut --help

      - name: Upload mutmut cache
        uses: actions/upload-artifact@v4
        with:
          name: mutmut-cache
          path: .mutmut-cache
          retention-days: 30